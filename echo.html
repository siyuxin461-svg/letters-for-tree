<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echoes Under Trees</title>

    <link rel="stylesheet" href="./echo.css" />
  </head>

  <audio id="echoBgSound" loop preload="auto">
    <source
      src="https://raw.githubusercontent.com/siyuxin461-svg/letter-for-tree-images./b4a40cb1ec5876c00b536d4f664b05b6c19992f7/night-wind-cicadas.wav"
      type="audio/wav"
    />
  </audio>
  
  <audio id="orbHoverSound" preload="auto">
    <source
      src="https://raw.githubusercontent.com/siyuxin461-svg/letter-for-tree-images./b4a40cb1ec5876c00b536d4f664b05b6c19992f7/echo-orb-hover.wav"
      type="audio/wav"
    />
  </audio>
  
  <body>
    <main class="echo-page">
      <div class="echo-bg"></div>
      <div class="echo-mist"></div>

      <a href="./index.html" class="back-link">back</a>

      <header class="echo-head">
        <h1>
          <span>树 下 回 声</span>
          <em>Echoes Under Trees</em>
        </h1>
      </header>

      <section class="light-field" id="lightField">
        <article
          class="echo-orb orb-01"
          data-title="躲 雨"
          data-letters="来自 12 封信"
          data-comments="8 条留言"
          data-feels="有 36 条同感"
          data-desc="有人在树下等雨停，有人想起小时候躲进树影里的下午。"
        >
          <span class="orb-core"></span>
          <div class="echo-info">
            <p class="letters"></p>
            <p class="comments"></p>
            <h2></h2>
            <p class="feels"></p>
            <p class="desc"></p>
          </div>
        </article>

        <article
          class="echo-orb orb-02"
          data-title="想 念"
          data-letters="来自 9 封信"
          data-comments="14 条留言"
          data-feels="有 28 条同感"
          data-desc="很多人把想念写给一棵树，因为树不会催促，也不会打断。"
        >
          <span class="orb-core"></span>
          <div class="echo-info">
            <p class="letters"></p>
            <p class="comments"></p>
            <h2></h2>
            <p class="feels"></p>
            <p class="desc"></p>
          </div>
        </article>

        <article
          class="echo-orb orb-03"
          data-title="路 过"
          data-letters="来自 21 封信"
          data-comments="6 条留言"
          data-feels="有 43 条同感"
          data-desc="每天都路过的树，也许正在保存那些没有被说出口的小事。"
        >
          <span class="orb-core"></span>
          <div class="echo-info">
            <p class="letters"></p>
            <p class="comments"></p>
            <h2></h2>
            <p class="feels"></p>
            <p class="desc"></p>
          </div>
        </article>

        <article
          class="echo-orb orb-04"
          data-title="等 人"
          data-letters="来自 7 封信"
          data-comments="11 条留言"
          data-feels="有 19 条同感"
          data-desc="树下总有人在等人，也有人等着自己慢慢好起来。"
        >
          <span class="orb-core"></span>
          <div class="echo-info">
            <p class="letters"></p>
            <p class="comments"></p>
            <h2></h2>
            <p class="feels"></p>
            <p class="desc"></p>
          </div>
        </article>

        <article
          class="echo-orb orb-05"
          data-title="夜 风"
          data-letters="来自 15 封信"
          data-comments="5 条留言"
          data-feels="有 31 条同感"
          data-desc="夜晚的树影会变得很轻，像有人把白天的声音慢慢收起来。"
        >
          <span class="orb-core"></span>
          <div class="echo-info">
            <p class="letters"></p>
            <p class="comments"></p>
            <h2></h2>
            <p class="feels"></p>
            <p class="desc"></p>
          </div>
        </article>

        <article
          class="echo-orb orb-06"
          data-title="长 大"
          data-letters="来自 18 封信"
          data-comments="10 条留言"
          data-feels="有 52 条同感"
          data-desc="树一年年长高，人也一年年变化，只是树从不急着证明什么。"
        >
          <span class="orb-core"></span>
          <div class="echo-info">
            <p class="letters"></p>
            <p class="comments"></p>
            <h2></h2>
            <p class="feels"></p>
            <p class="desc"></p>
          </div>
        </article>

        <article
          class="echo-orb orb-07"
          data-title="安 静"
          data-letters="来自 11 封信"
          data-comments="4 条留言"
          data-feels="有 24 条同感"
          data-desc="有些安慰不是语言，而是你坐在树下，什么都不用解释。"
        >
          <span class="orb-core"></span>
          <div class="echo-info">
            <p class="letters"></p>
            <p class="comments"></p>
            <h2></h2>
            <p class="feels"></p>
            <p class="desc"></p>
          </div>
        </article>

        <article
          class="echo-orb orb-08"
          data-title="告 别"
          data-letters="来自 6 封信"
          data-comments="9 条留言"
          data-feels="有 17 条同感"
          data-desc="有些告别被留在树下，像一片落叶，轻轻放回生活里。"
        >
          <span class="orb-core"></span>
          <div class="echo-info">
            <p class="letters"></p>
            <p class="comments"></p>
            <h2></h2>
            <p class="feels"></p>
            <p class="desc"></p>
          </div>
        </article>

        <article
          class="echo-orb orb-09"
          data-title="发 呆"
          data-letters="来自 13 封信"
          data-comments="7 条留言"
          data-feels="有 29 条同感"
          data-desc="发呆不是浪费时间，可能只是把自己暂时交给一片树影。"
        >
          <span class="orb-core"></span>
          <div class="echo-info">
            <p class="letters"></p>
            <p class="comments"></p>
            <h2></h2>
            <p class="feels"></p>
            <p class="desc"></p>
          </div>
        </article>
      </section>
    </main>

    <script src="./echo.js"></script>
  </body>
</html>
